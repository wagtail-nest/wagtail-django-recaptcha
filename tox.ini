# Tox (http://tox.testrun.org/) is a tool for running tests
# in multiple virtualenvs. This configuration file will run the
# test suite on all supported python versions. To use it, "pip install tox"
# and then run "tox" from this directory.

[tox]
skipsdist = True
usedevelop = True
envlist =
    py{310,311,312}-dj42-wt{70,72}-dr4
    py{310,311,312,313}-dj52-wt{70,72,73}-dr4
    py314-dj60-wt73-dr4

[testenv]
install_command = pip install -e ".[testing]" -U {opts} {packages}
allowlist_externals =
    make

basepython =
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13
    py314: python3.14
deps =
    dj42: Django>=4.2,<4.3
    dj52: Django>=5.2,<5.3
    dj60: Django>=6.0,<6.1
    wt70: wagtail>=7.0,<7.1
    wt72: wagtail>=7.2,<7.3
    wt73: wagtail>=7.3,<7.4
    dr4: django_recaptcha>=4.0.0,<5.0.0

commands =
    make lint
    make test-coverage

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314
