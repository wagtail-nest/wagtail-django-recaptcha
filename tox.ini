# Tox (http://tox.testrun.org/) is a tool for running tests
# in multiple virtualenvs. This configuration file will run the
# test suite on all supported python versions. To use it, "pip install tox"
# and then run "tox" from this directory.

[tox]
envlist =
    ; Django 5.2, supported Wagtail versions (LTS + latest)
    py{310,311,312,313}-dj52-wt{70,73}-dr4
    ; Django 6.0, supported Wagtail versions (Django 6.0 support was added in Wagtail 7.3)
    py{312,313,314}-dj60-{wt73,wt74}-dr4

[testenv]
setenv =
    COVERAGE_FILE=.coverage.{envname}
    PYTHONWARNINGS=always::DeprecationWarning
extras = testing
allowlist_externals =
    make

basepython =
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13
    py314: python3.14

deps =
    dj52: Django>=5.2b1,<5.3
    dj60: Django>=6.0,<6.1
    wt70: wagtail>=7.0,<7.1
    wt73: wagtail>=7.3,<7.4
    wt74: wagtail>=7.4rc1,<7.5
    dr4: django_recaptcha>=4.0.0,<5.0.0

commands =
    make test-coverage

[testenv:future]
basepython = python3.14
env =
    PYTHONWARNINGS=always::DeprecationWarning
commands_pre =
    ; Test compatibility with development versions of Django and Wagtail
    ; no-deps necessary to stop pip from complaining about incompatible versions
    pip install -U --no-deps \
    ; installing from zip archives is quicker than performing git operations
    https://github.com/django/django/archive/refs/heads/main.zip \
    https://github.com/wagtail/wagtail/archive/refs/heads/main.zip \
    https://github.com/django-recaptcha/django-recaptcha/archive/refs/heads/main.zip

    ; List installed packages again
    pip freeze
extras = testing

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314
